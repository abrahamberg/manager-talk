<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Communication Coach</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">Communication Coach</p>
        <h1>Practice one answer at a time.</h1>
        <p id="progress" class="progress">Loading session...</p>
        <div class="format-card">
          <span>Answer format</span>
          <p id="format">Loading format...</p>
        </div>
        <div class="speech-card">
          <span>Speech</span>
          <label class="speech-toggle">
            <input id="auto-speak-toggle" type="checkbox" checked />
            Read coach messages aloud
          </label>
          <p id="speech-status">Speech tools are loading...</p>
        </div>
      </section>

      <section class="chat-card">
        <div id="messages" class="messages"></div>
        <div class="speech-actions">
          <button id="replay-button" class="secondary-button" type="button">Replay coach</button>
          <button id="stop-speaking-button" class="secondary-button" type="button">Stop voice</button>
        </div>
        <form id="chat-form" class="composer">
          <textarea id="message-input" rows="3" placeholder="Type your answer"></textarea>
          <button id="mic-button" class="mic-button" type="button">Speak</button>
          <button id="submit-button" type="submit">Send</button>
        </form>
        <button id="next-button" class="next-button" type="button" hidden>Next question</button>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
